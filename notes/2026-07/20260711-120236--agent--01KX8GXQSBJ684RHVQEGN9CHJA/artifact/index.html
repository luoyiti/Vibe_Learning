<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>知识沉淀系统 · 多 Agent 架构原理与使用</title>
<meta name="description" content="四层架构、四份提示词契约、单写者与路由机制——一份可交互的学术风格说明。" />
<style>
:root {
  --canvas: #f4f5f8;
  --paper: #ffffff;
  --ink: #1b1d24;
  --ink-soft: #565b67;
  --ink-faint: #8b909c;
  --line: #e4e7ec;
  --line-strong: #d2d6de;
  --accent: #4842c7;

  --agent: #5750ce;
  --agent-bg: #ecebfb;
  --agent-bd: #c9c5f2;
  --tool: #a9711b;
  --tool-bg: #faf0dc;
  --tool-bd: #ecd7a8;
  --store: #167f6b;
  --store-bg: #dcf1eb;
  --store-bd: #a6ddce;
  --show: #b14f76;
  --show-bg: #fae5ec;
  --show-bd: #efc2d2;

  --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
    "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --serif: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono",
    "Courier New", monospace;
}

* {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--canvas);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.72;
  -webkit-font-smoothing: antialiased;
}

.paper {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 28px 80px;
}

.mast {
  padding: 64px 0 40px;
  border-bottom: 1px solid var(--line-strong);
}

.eyebrow {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 600;
  margin: 0 0 20px;
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}

.eyebrow .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

h1.title {
  font-family: var(--serif);
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: clamp(32px, 5.5vw, 48px);
  line-height: 1.06;
  margin: 0 0 6px;
}

h1.title .en {
  display: block;
  font-family: var(--mono);
  font-weight: 400;
  font-size: clamp(11px, 2.2vw, 14px);
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-top: 14px;
}

.subtitle {
  font-size: clamp(17px, 2.6vw, 21px);
  color: var(--ink-soft);
  margin: 18px 0 0;
  max-width: 42em;
}

.lead {
  margin: 26px 0 0;
  max-width: 44em;
}

.lead b {
  color: var(--accent);
}

.tab-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 30px 0 0;
  padding: 6px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
}

.tab-btn {
  flex: 1;
  min-width: 120px;
  padding: 10px 16px;
  border: none;
  border-radius: 7px;
  background: transparent;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.tab-btn:hover {
  background: var(--canvas);
}

.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

section.block {
  padding: 48px 0;
  border-bottom: 1px solid var(--line);
}

.sec-head {
  display: flex;
  gap: 18px;
  align-items: baseline;
  margin: 0 0 22px;
}

.sec-num {
  font-family: var(--serif);
  font-size: 30px;
  color: var(--accent);
  line-height: 1;
  font-weight: 600;
  min-width: 46px;
}

.sec-head h2 {
  font-size: clamp(21px, 3.4vw, 27px);
  margin: 0;
  letter-spacing: -0.01em;
  font-weight: 650;
}

.sec-en {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-top: 6px;
}

.indent {
  padding-left: 64px;
}

@media (max-width: 640px) {
  .indent {
    padding-left: 0;
  }
}

p {
  margin: 0 0 16px;
}

.muted {
  color: var(--ink-soft);
}

.legend {
  display: flex;
  gap: 10px 22px;
  flex-wrap: wrap;
  align-items: center;
  margin: 22px 0 0;
  padding: 14px 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 13.5px;
  color: var(--ink-soft);
}

.legend .k {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  white-space: nowrap;
}

.swatch {
  width: 13px;
  height: 13px;
  border-radius: 3px;
  display: inline-block;
  vertical-align: -2px;
}

.sw-a { background: var(--agent); }
.sw-t { background: var(--tool); }
.sw-s { background: var(--store); }
.sw-d { background: var(--show); }

.layer-stack {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 20px 0;
}

.layer-card {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  gap: 16px;
  align-items: center;
  padding: 16px 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-left: 4px solid var(--lc, var(--accent));
  border-radius: 9px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
}

.layer-card:hover,
.layer-card.sel {
  box-shadow: 0 4px 18px rgba(27, 29, 36, 0.07);
}

.layer-card.sel {
  transform: translateX(4px);
}

.layer-no {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--lc, var(--accent));
  text-align: center;
}

.layer-card h3 {
  margin: 0 0 4px;
  font-size: 16px;
}

.layer-card p {
  margin: 0;
  font-size: 13.5px;
  color: var(--ink-soft);
  line-height: 1.55;
}

.layer-tag {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 5px;
  background: var(--lb, var(--agent-bg));
  color: var(--lc, var(--agent));
  border: 1px solid var(--lbd, var(--agent-bd));
  white-space: nowrap;
}

.layer-detail {
  margin: 14px 0 0;
  padding: 18px 20px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 9px;
  font-size: 14.5px;
}

.layer-detail h4 {
  margin: 0 0 8px;
  font-size: 14px;
  color: var(--accent);
}

.layer-detail ul {
  margin: 0;
  padding-left: 1.2em;
  color: var(--ink-soft);
}

.layer-detail li {
  margin-bottom: 4px;
}

.agent-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

@media (max-width: 760px) {
  .agent-grid {
    grid-template-columns: 1fr;
  }
}

.agent-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 9px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s;
}

.agent-card:hover,
.agent-card.open {
  box-shadow: 0 4px 18px rgba(27, 29, 36, 0.07);
}

.agent-head {
  padding: 16px 18px;
  border-bottom: 1px solid transparent;
}

.agent-card.open .agent-head {
  border-bottom-color: var(--line);
  background: var(--agent-bg);
}

.agent-head h3 {
  margin: 0 0 4px;
  font-size: 15.5px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.agent-head .badge {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--agent);
  color: #fff;
}

.agent-head .badge.write { background: var(--tool); }
.agent-head .badge.read { background: var(--store); }
.agent-head .badge.code { background: var(--show); }

.agent-head p {
  margin: 0;
  font-size: 13.5px;
  color: var(--ink-soft);
}

.agent-body {
  padding: 14px 18px 16px;
  font-size: 13.5px;
  color: var(--ink-soft);
  line-height: 1.62;
}

.agent-body ul {
  margin: 8px 0 0;
  padding-left: 1.2em;
}

.agent-body code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--canvas);
  padding: 1px 5px;
  border-radius: 3px;
}

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

@media (max-width: 760px) {
  .cards {
    grid-template-columns: 1fr;
  }
}

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 9px;
  padding: 16px 18px;
}

.card h3 {
  margin: 0 0 6px;
  font-size: 15.5px;
  display: flex;
  gap: 9px;
  align-items: baseline;
}

.card h3 .n {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
}

.card p {
  margin: 0;
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.62;
}

.flow-wrap {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 24px 20px;
  overflow-x: auto;
}

.flow-svg {
  display: block;
  margin: 0 auto;
  max-width: 100%;
}

.route-sim {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 20px;
}

.route-sim label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--ink-soft);
}

.route-sim textarea {
  width: 100%;
  min-height: 72px;
  padding: 12px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  resize: vertical;
  line-height: 1.5;
}

.route-sim textarea:focus {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}

.route-result {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 8px;
  font-size: 14px;
}

.route-result.hit {
  background: var(--agent-bg);
  border: 1px solid var(--agent-bd);
}

.route-result.miss {
  background: #fef2f2;
  border: 1px solid #fecaca;
}

.route-result .contract {
  font-weight: 700;
  color: var(--agent);
}

.cli-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 9px;
  overflow: hidden;
}

.cli-table th,
.cli-table td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}

.cli-table th {
  background: var(--canvas);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 600;
}

.cli-table tr:last-child td {
  border-bottom: none;
}

.cli-table code {
  font-family: var(--mono);
  font-size: 12.5px;
  background: var(--canvas);
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
}

.cli-table .ro {
  color: var(--store);
  font-weight: 600;
  font-size: 12px;
}

.cli-table .rw {
  color: var(--tool);
  font-weight: 600;
  font-size: 12px;
}

.callout {
  margin: 22px 0 0;
  padding: 16px 20px;
  border-radius: 10px;
  background: var(--agent-bg);
  border: 1px solid var(--agent-bd);
  font-size: 14.5px;
}

.callout .tag {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--agent);
  font-weight: 700;
  display: block;
  margin-bottom: 5px;
}

.fig {
  margin: 22px 0;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}

.fig svg {
  display: block;
  width: 100%;
}

.fig figcaption {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--ink-soft);
  border-top: 1px solid var(--line);
}

.fig figcaption b {
  color: var(--ink);
}

.reveal {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.reveal.in {
  opacity: 1;
  transform: none;
}

footer.foot {
  padding: 40px 0 0;
  font-size: 13px;
  color: var(--ink-faint);
  text-align: center;
}

</style>
</head>
<body>
<div id="root"></div>
