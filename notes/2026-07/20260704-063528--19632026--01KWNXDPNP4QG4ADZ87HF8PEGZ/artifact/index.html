<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>树模型六十年：从递归划分到表格基础模型</title>
<meta name="description" content="树模型机器学习的历史发展历程与最新前沿方向——一份可交互的学术综述，内含在浏览器中现场训练的 CART / 随机森林 / 梯度提升实验台（真实数据）。" />
<style>
/* 学术论文风：纸面、衬线标题、编号章节、图注。图表内一律系统无衬线。 */
:root {
  --paper: #f9f9f7;
  --surface: #fcfcfb;
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --ink-3: #898781;
  --hairline: #e1e0d9;
  --accent: #2a78d6;
  --serif: Georgia, "Times New Roman", "Songti SC", "Noto Serif SC", "SimSun", serif;
  --sans: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 16.5px;
  line-height: 1.85;
  -webkit-font-smoothing: antialiased;
}

.paper { max-width: 1020px; margin: 0 auto; padding: 0 24px 90px; }

/* ---------- masthead / hero ---------- */
.masthead {
  display: flex; justify-content: space-between;
  padding: 18px 2px 14px;
  border-bottom: 2px solid var(--ink);
  font-family: var(--sans); font-size: 12.5px; letter-spacing: 0.12em;
  color: var(--ink-2);
}
.hero { position: relative; margin: 0 -24px; }
.hero-art { display: block; width: 100%; height: clamp(300px, 42vh, 430px); }
.hero-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; padding: 0 24px;
}
.kicker {
  font-family: var(--sans); font-size: 12px; letter-spacing: 0.34em;
  color: var(--ink-2); margin-bottom: 18px;
  animation: rise 0.8s 0.1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
}
.hero-text h1 {
  font-size: clamp(52px, 9vw, 96px); font-weight: 700; letter-spacing: 0.04em;
  line-height: 1.1;
  animation: rise 0.9s 0.25s cubic-bezier(0.2, 0.7, 0.2, 1) both;
}
.subtitle {
  margin-top: 20px; font-size: clamp(15px, 2.3vw, 19px); color: var(--ink-2);
  animation: rise 0.9s 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) both;
}
@keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }

/* ---------- abstract ---------- */
.abstract {
  margin: 54px auto 0; max-width: 760px;
  border-top: 1px solid var(--ink); border-bottom: 1px solid var(--hairline);
  padding: 26px 4px 22px;
}
.abstract h3 {
  font-family: var(--sans); font-size: 13px; letter-spacing: 0.3em;
  margin-bottom: 12px; color: var(--ink-2);
}
.abstract p { font-size: 15.5px; text-align: justify; }
.keywords { margin-top: 14px; font-size: 13.5px !important; color: var(--ink-2); }

/* ---------- sections ---------- */
section { max-width: 760px; margin: 72px auto 0; }
section h2 {
  font-size: 27px; font-weight: 700; line-height: 1.4;
  margin-bottom: 22px; letter-spacing: 0.01em;
}
.sec-no {
  display: inline-block; min-width: 40px; color: var(--accent);
  font-family: var(--sans); font-weight: 700;
}
section h3 { font-size: 19px; margin: 34px 0 12px; }
section p { margin-bottom: 14px; text-align: justify; }
b { font-weight: 700; }

.cite { font-family: var(--sans); font-size: 0.68em; }
.cite a { color: var(--accent); text-decoration: none; }
.cite a:hover { text-decoration: underline; }

.claims { margin: 0 0 14px 1.4em; }
.claims li { margin-bottom: 8px; }

/* ---------- figures：比正文宽，学术图版式 ---------- */
.fig {
  margin: 30px auto; width: min(1000px, calc(100vw - 48px));
  transform: translateX(calc((760px - min(1000px, 100vw - 48px)) / 2));
  background: var(--surface);
  border: 1px solid var(--hairline); border-radius: 10px;
  padding: 22px 22px 14px;
}
@media (max-width: 1060px) { .fig { transform: none; width: 100%; } }
.fig figcaption {
  font-family: var(--sans); font-size: 12.5px; color: var(--ink-2);
  border-top: 1px solid var(--hairline); margin-top: 14px; padding-top: 10px;
  line-height: 1.6;
}
.fig-sub { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin: 4px 2px 10px; line-height: 1.55; }

/* ---------- labs ---------- */
.lab { font-family: var(--sans); }
.lab-row { display: flex; gap: 26px; flex-wrap: wrap; align-items: flex-start; }
.lab-row > div { flex: 1 1 380px; min-width: 0; }
.plot-wrap { width: 100%; }

.controls {
  display: flex; flex-wrap: wrap; gap: 16px 22px; align-items: center;
  padding: 10px 0 16px; margin-bottom: 8px;
  border-bottom: 1px solid var(--hairline);
}
.ctl { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; }
.ctl-check { flex-direction: row; align-items: center; gap: 8px; max-width: 420px; }
.ctl-label { color: var(--ink-2); }
.ctl-label b { color: var(--ink); font-variant-numeric: tabular-nums; }
.ctl input[type="range"] { width: 190px; accent-color: var(--accent); }
.ctl select {
  font: inherit; padding: 4px 8px; border: 1px solid var(--hairline);
  border-radius: 6px; background: var(--surface); color: var(--ink);
}
.btn {
  font: inherit; font-size: 13px; padding: 7px 14px; cursor: pointer;
  border: 1px solid var(--ink-3); border-radius: 7px;
  background: var(--surface); color: var(--ink);
  transition: background 0.15s, transform 0.1s;
}
.btn:hover { background: #f1f0ec; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #1c5cab; }

.legend { display: flex; gap: 18px; flex-wrap: wrap; margin: 6px 2px; font-size: 12.5px; color: var(--ink-2); }
.legend-item { display: inline-flex; align-items: center; gap: 6px; }
.legend-swatch { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

.stats-col { display: flex; flex-direction: column; gap: 14px; max-width: 300px; }
.stat { border-left: 3px solid var(--accent); padding: 2px 0 2px 14px; }
.stat-value { font-size: 30px; font-weight: 700; line-height: 1.15; font-variant-numeric: tabular-nums; }
.stat-label { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.stat-note { font-size: 12.8px; color: var(--ink-2); line-height: 1.7; margin-top: 10px; }
.stat-note b { font-variant-numeric: tabular-nums; }

.tree-scroll { overflow-x: auto; margin-top: 18px; padding-top: 14px; border-top: 1px dashed var(--hairline); }
.tree-scroll svg { min-width: 640px; }

/* ---------- timeline ---------- */
.timeline { font-family: var(--sans); }
.tl-era-name {
  font-size: 12px; letter-spacing: 0.22em; color: var(--ink-3);
  margin: 26px 0 8px; text-transform: uppercase;
}
.tl-era:first-child .tl-era-name { margin-top: 4px; }
.tl-item { border-bottom: 1px solid var(--hairline); }
.tl-head {
  display: grid; grid-template-columns: 58px 128px 1fr 22px; gap: 14px; align-items: baseline;
  width: 100%; text-align: left; padding: 12px 4px; cursor: pointer;
  background: none; border: none; font: inherit; color: inherit;
  transition: background 0.15s;
}
.tl-head:hover { background: #f3f2ee; }
.tl-year { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
.tl-name { font-weight: 700; }
.tl-line { font-size: 13px; color: var(--ink-2); }
.tl-toggle { color: var(--ink-3); font-size: 16px; text-align: center; }
.tl-body { padding: 2px 4px 16px 72px; font-size: 13.5px; color: var(--ink-2); line-height: 1.75; }
.tl-who { font-weight: 600; color: var(--ink); }
.tl-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.tl-tags span {
  font-size: 11.5px; padding: 3px 10px; border-radius: 99px;
  border: 1px solid var(--hairline); background: var(--surface); color: var(--ink-2);
}
@media (max-width: 640px) {
  .tl-head { grid-template-columns: 48px 1fr 22px; }
  .tl-line { grid-column: 1 / -1; }
  .tl-body { padding-left: 4px; }
}

/* ---------- growth anim / bench ---------- */
.growth-tree { flex: 1 1 340px; }
.growth-title { font-size: 12.5px; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }

.elo-bars { display: flex; flex-direction: column; gap: 16px; margin: 14px 0 10px; }
.elo-name { font-size: 12.5px; color: var(--ink-2); margin-bottom: 5px; }
.elo-track { position: relative; height: 26px; background: #f1f0ec; border-radius: 5px; overflow: hidden; }
.elo-fill { height: 100%; border-radius: 5px 0 0 5px; }
.elo-val {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums;
}

/* ---------- table ---------- */
.table-scroll { overflow-x: auto; margin: 20px 0; }
.cmp {
  border-collapse: collapse; font-family: var(--sans); font-size: 13px;
  min-width: 680px; width: 100%; line-height: 1.6;
}
.cmp th, .cmp td { padding: 10px 12px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--hairline); }
.cmp thead th { border-bottom: 2px solid var(--ink); font-size: 13.5px; }
.cmp tbody th { white-space: nowrap; color: var(--ink-2); font-weight: 600; }

/* ---------- refs / footer ---------- */
.refs { font-family: var(--sans); font-size: 13px; color: var(--ink-2); line-height: 1.8; margin-left: 1.5em; }
.refs li { margin-bottom: 9px; }
.refs a { color: var(--accent); text-decoration: none; word-break: break-all; }
.refs a:hover { text-decoration: underline; }
.foot {
  max-width: 760px; margin: 80px auto 0; padding-top: 18px;
  border-top: 2px solid var(--ink);
  font-family: var(--sans); font-size: 12px; color: var(--ink-3); line-height: 1.7;
}

/* ---------- scroll reveal ---------- */
.reveal { opacity: 0; transform: translateY(26px); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1); }
.reveal.in { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
  .kicker, .hero-text h1, .subtitle { animation: none; }
}

</style>
</head>

<div id="root"></div>
